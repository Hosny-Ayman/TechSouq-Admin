<div class="card p-4">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold">Manage Brands</h2>
        <button pButton icon="pi pi-plus" label="Add New" class="p-button-success" (click)="openNew()"></button>
    </div>

    <p-table
        [value]="brands"
        [lazy]="true"
        [first]="first"
        (onLazyLoad)="loadBrands($event)"
        [paginator]="true"
        [rows]="pageSize"
        [totalRecords]="totalRecords"
        [loading]="loading"
        [rowsPerPageOptions]="[5,10,20,30,40,50]"
        [tableStyle]="{ 'min-width': '50rem' }"
        class="p-datatable-gridlines"
    >
        <ng-template pTemplate="header">
            <tr>
                <th>ID</th>

                <th>Name</th>
                <th>Actions</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-bra>
            <tr>
                <td>{{ bra.id }}</td>
                <td>{{ bra.name }}</td>
                <td>
                    <button pButton icon="pi pi-pencil" class="p-button-rounded p-button-info mr-2" (click)="editbrands(bra)"></button>
                    <button pButton icon="pi pi-trash" class="p-button-rounded p-button-danger" (click)="deletebrand(bra.id)"></button>
                </td>
            </tr>
        </ng-template>
    </p-table>

    @if (brands.length ===0){
    <div class="text-center p-4 text-gray-500 font-medium">No brands found.</div>
    }
</div>

<p-dialog [(visible)]="displayDialog" [style]="{width: '450px'}" [header]="isEditMode ? 'Edit brand' : 'New brand'" [modal]="true">
    <div class="flex flex-col gap-4 mt-4">
        <div class="flex flex-col gap-2">
            <label for="name" class="font-bold">brand Name</label>
            <input pInputText id="name" [(ngModel)]="brand.name" class="w-full" />
        </div>
    </div>

    <ng-template pTemplate="footer">
        <button pButton label="Cancel" icon="pi pi-times" class="p-button-text" (click)="displayDialog = false"></button>
        <button pButton label="Save" icon="pi pi-check" class="p-button-primary" (click)="savebrands()"></button>
    </ng-template>
</p-dialog>
